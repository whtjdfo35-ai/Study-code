<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage1</title>
    <link rel="stylesheet" href="Stage_jsl.css">
    <style>
        #hint1 {
            position: relative;
            left: 15vw;
            top: 5vh;
        }

        #hint2 {
            position: absolute;
            right: 15vw;
            top: 20vh;
        }

        #hint3 {
            position: absolute;
            right: 20vw;
            top: 80vh;
        }

        .hintLetter {
            font-weight: bold;
        }
    </style>    
    
    <script>
        window.onload = () => {

            //game화면 크기설정
            document.querySelector('#gameArea').clientHeight = window.innerHeight
            document.querySelector('#gameArea').clientWidth = window.innerWidth
            //우클릭, 드래그 막기
            document.querySelector('#gameArea').onselectstart = () => false
            document.querySelector('#gameArea').oncontextmenu = () => false
            //출력창에서만 드래그 가능
            document.querySelector('#output').addEventListener('selectstart', e => {
                e.stopPropagation();
            })

            //키보드 입력시 이벤트
            //object움직임           
            document.addEventListener('keydown', objectMove)
            //입력창에 입력            
            document.addEventListener('keyup', consoleInput)

            //기믹 생성
            //goal에 disappear클래스 부여해서 위치를 이동시킴
            document.querySelector('body').addEventListener('mousemove', evt => {
                document.querySelector('.goal').classList.add('disappear')
            })

            //goal에 마우스 올리면 위치 랜덤하게 변경
            document.querySelector('.goal').addEventListener('mouseover', goalJump)

            //클리어 조건
            //goal을 더블 클릭
            document.querySelector('.goal').addEventListener('dblclick', evt => {
                alert('클리어')    //클리어 메시지 출력
                window.location.href = "stage2_jsl.html" // 다음 스테이지로 전환
            })
        }


        //기믹
        //goal에 마우스 올리면 위치 랜덤하게 변경
        function goalJump(evt) {
            document.querySelector('.goal').style.position = 'absolute'
            document.querySelector('.goal').style.top = Math.random() * (window.innerHeight - (document.querySelector('.goal').clientHeight)) + 'px'
            document.querySelector('.goal').style.left = Math.random() * (window.innerWidth - (document.querySelector('.goal').clientWidth)) + 'px'
        }

        //object 움직임        
        function objectMove(evt) {
            const obj = getComputedStyle(document.querySelector('#object'))
            //obj가 움직일 거리
            let up = 20
            let down = 20
            let right = 20
            let left = 20

            //object의 움직임 범위를 화면 범위로 제한
            if (parseInt(obj.top) > (window.innerHeight - (document.querySelector('#object').clientHeight)-20)) {
                down = 0
            }
            if (parseInt(obj.top) < 0.5 * (document.querySelector('#object').clientHeight)) {
                up = 0
            }
            if (parseInt(obj.left) > (window.innerWidth - (document.querySelector('#object').clientWidth)-20)) {
                right = 0
            }
            if (parseInt(obj.left) < 0.5 * (document.querySelector('#object').clientWidth)+3) {
                left = 0
            }

            //화살표를 누르면 obj가 움직임
            if (evt.key === 'ArrowRight') {
                document.querySelector('#object').style.left = parseInt(obj.left) + right + 'px'
            }
            if (evt.key === 'ArrowLeft') {
                document.querySelector('#object').style.left = parseInt(obj.left) - left + 'px'
            }
            if (evt.key === 'ArrowUp') {
                document.querySelector('#object').style.top = parseInt(obj.top) - up + 'px'
            }
            if (evt.key === 'ArrowDown') {
                document.querySelector('#object').style.top = parseInt(obj.top) + down + 'px'
            }

            //오브젝트가 힌트 근처로 접근하면 보이는 힌트들
            const hint1 = getComputedStyle(document.querySelector('#hint1'))
            revealHint1()

            const hint2 = getComputedStyle(document.querySelector('#hint2'))
            revealHint2()

            const hint3 = getComputedStyle(document.querySelector('#hint3'))
            revealHint3()
        }
        

        //입력창에 입력하고 엔터 치면 콘솔에서 실행 & 내용 지우기
        let count = 0
        function consoleInput(evt) {
            //사용자가 쓰기 편하게 짧은 키워드 만들어두기            
            const style = document.querySelector('.goal').style

            //출력할 힌트들
            const hint1 = 'hint1: 입력창에 입력하는 내용은 콘솔창에 입력됩니다'
            const hint2 = 'hint2: 보라색 원을 움직여 찾을수 있는 힌트는 3개입니다'
            const hint3 = 'hint3: 오른쪽 위는 가보셨나요?'
            const hint4 = "document.querySelector('.goal').???EventListener('mouseover', goalJump)"

            if (evt.key === 'Enter') {
                // 입력창 중간에 엔터 쳐도 입력되게 방어
                const inputRaw = document.querySelector('#input').value
                let input = inputRaw.split('\n')[0]
                if (inputRaw.split('\n').length == 2) {
                    input += inputRaw.split('\n')[1]
                }
                //엔터치면 힌트1을 숨겨서 출력창과 겹치지 않게 함
                document.querySelector('#hint1').style.zIndex = -1
                try {
                    //입력창에 힌트/hint입력하면 힌트들 주기
                    if (input.trim() == 'hint' || input.trim() == '힌트') {
                        if (count == 0) {
                            print(hint1)
                            count++
                        } else if (count == 1) {
                            print(hint2)
                            count++
                        } else if (count == 2) {
                            print(hint3)
                            count++
                        } else if (count == 3) {
                            print(hint4)
                            count++
                        } else {
                            const mm = '너는 지금 ' + count + '번이나 힌트를 입력했어\n 다시 힌트를 보고 싶으면 힌트번호를 적어'
                            print(mm)
                            count++
                        }
                    }
                    //힌트+번호 또는 번호 입력하면 힌트 보여주기
                    else if (input.trim().substr(0, 5) == 'hint1' || input.trim().substr(0, 3) == '힌트1' || input.trim() == 1) {
                        print(hint1)
                    } else if (input.trim().substr(0, 5) == 'hint2' || input.trim().substr(0, 3) == '힌트2' || input.trim() == 2) {
                        print(hint2)
                    } else if (input.trim().substr(0, 5) == 'hint3' || input.trim().substr(0, 3) == '힌트3' || input.trim() == 3) {
                        print(hint3)
                    } else if (input.trim().substr(0, 5) == 'hint4' || input.trim().substr(0, 3) == '힌트4' || input.trim() == 4) {
                        print(hint4)
                    } else if (input.trim().substr(0, 5) == 'hint5' || input.trim().substr(0, 3) == '힌트5' || input.trim() == 5) {
                        print(hint5)
                    } else {
                        //입력창에 입력한 명령어를 콘솔창에서 실행                        
                        console.log(eval(input))
                        print('')
                    }
                } finally {
                    //입력창 지우기
                    document.querySelector('#input').value = ''
                }
            }
        }

        //출력창
        function print(msg) {
            const output = document.querySelector('#output')
            output.innerHTML = ''
            output.innerHTML += msg
            output.scrollTop = output.scrollHeight
        }

        //힌트1 오브젝트가 힌트 근처로 접근
        function revealHint1() {
            const obj = getComputedStyle(document.querySelector('#object'))
            if (parseInt(obj.left) >= hint1.offsetLeft - 20
                && parseInt(obj.left) <= hint1.offsetLeft + 400
                && parseInt(obj.top) <= hint1.offsetTop + 40
                && parseInt(obj.top) >= hint1.offsetTop - 40) {
                hint1.style.zIndex = 0
            }
        }

        //힌트2 오브젝트가 힌트 근처로 접근
        function revealHint2() {
            const obj = getComputedStyle(document.querySelector('#object'))
            if (parseInt(obj.left) >= 0.7 * window.innerWidth - 700
                && parseInt(obj.left) <= 0.7 * window.innerWidth
                && parseInt(obj.top) <= 0.2 * window.innerHeight + 40
                && parseInt(obj.top) >= 0.2 * window.innerHeight - 40) {
                hint2.style.zIndex = 0
            }
        }

        //힌트3 오브젝트가 힌트 근처로 접근
        function revealHint3() {
            const obj = getComputedStyle(document.querySelector('#object'))
            if (parseInt(obj.left) >= 0.7 * window.innerWidth - 200
                && parseInt(obj.left) <= 0.7 * window.innerWidth + 100
                && parseInt(obj.top) <= 0.8 * window.innerHeight + 60
                && parseInt(obj.top) >= 0.8 * window.innerHeight - 60) {
                hint3.style.zIndex = 0
            }
        }
    </script>
</head>

<body>
    <div id="gameArea">
        <div class="text">
            <div class="title">FIND <span class="goal">ME</span></div>
            <div class="des">사라진 나를 찾아주세요</div>
        </div>
        <div id="object"></div>
        <textarea id="input"></textarea>
        <div></div>
        <span id="hint1" class="hint">사라진 글자를 찾아서 더블 클릭하면 성공입니다</span>
        <div><span id="hint2" class="hint">document.querySelector('.goal').addEventListener('mouseover',
                goalJump)
            </span>
        </div>
        <div><span id="hint3" class="hint">잘 모르실 땐 입력창에 <span class="hintLetter">"힌트"</span>를 입력해보세요</span></div>
        <div class="outputWrapper">
            <div id="output">방향키를 사용해 보라색 원을 움직여 보세요</div>
        </div>
    </div>
</body>

</html>
