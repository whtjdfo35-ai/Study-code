<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작업현황조회</title>

    <style>
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .table {
            border: 1px solid #999;
            border-radius: 6px;
            overflow-x: auto;            
        }

        table {
            width: 100%;
            min-width: 1000px;           
            border-collapse: collapse;
        }

        th {
            background: #e8dba4;
        }

        th,
        td {
            border: 1px solid #555;
            padding: 8px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="searchbox">
        <input type="text" placeholder="검색" class="search">
        <button>🔍</button>
    </div>


    <div class="paging">
        <button>페이지1</button>
        <button>페이지2</button>
    </div>

    <table class="table">
        <th>
        <td>NO</td>
        <td>작업지시번호</td>
        <td>날짜</td>
        <td>제품코드</td>
        <td>제품명</td>
        <td>진행률</td>
        <td>라인</td>
        <td>공정</td>
        <td>로스</td>
        <td>비고</td>
        </th>
    </table>
</body>

</html>
